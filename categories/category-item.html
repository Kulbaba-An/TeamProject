<div id="category-items" class="col-lg-3 col-md-4 col-sm-6 mb-4 ">
    <div class="p-3  rounded reg-card h-100 text-center reg-card">
        <a href="#" class="text-decoration-none text-dark" onclick="$ns.loadCatalogItems('{{short_name}}'); return false;">
            <div class="category-item-photo">
               <img src="svg/{{short_name}}.svg" class="img-fluid" alt="{{name}}" style="max-height: 100px; width: auto;">
            </div>
            <h5 class="mt-3">{{name}}</h5>
        </a>
    </div>
</div>
